# file: .github/workflows/release.yml
# version: 2.4.2
# guid: f0c1ker0-0000-4000-8000-000000000003

name: Build image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      stable:
        description: 'Publish as stable release (not pre-release)'
        required: false
        default: 'false'
        type: string

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  checks: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build + push image
    uses: falkcorp/github-common/.github/workflows/reusable-release.yml@483f3afeb0064ccbe6ad565044042ba6faee1f96 # v2.14.0
    with:
      release-type: 'auto'
      prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') && inputs.stable != 'true' }}
      stable: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.stable == 'true' }}
      draft: false
      docker-enabled: true
      build-target: 'docker'
    secrets: inherit

  # Retag the image with the overnight-burndown commit SHA so that:
  # (a) each image has an immutable, semantic tag that never gets overwritten,
  # (b) the same burndown-runner-image commit rebuilt against new overnight-burndown
  #     code produces a distinct tag, and
  # (c) reusable-burndown.yml is updated automatically so callers don't have to
  #     manually edit the SHA pin after every image build.
  retag:
    name: Retag as ob-<burndown-sha> + update callers
    runs-on: ubuntu-latest
    needs: release
    permissions:
      packages: write
      contents: write
    steps:
      - name: Resolve overnight-burndown HEAD SHA
        id: ob
        run: |
          sha=$(git ls-remote https://github.com/falkcorp/overnight-burndown.git main | cut -f1)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "sha7=${sha:0:7}" >> "$GITHUB_OUTPUT"
          echo "tag=ob-${sha:0:7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, retag, and push ob-<sha7>
        id: retag
        env:
          RUNNER_SHA: ${{ github.sha }}
          OB_TAG: ${{ steps.ob.outputs.tag }}
        run: |
          src="ghcr.io/falkcorp/burndown-runner-image:${RUNNER_SHA}"
          dst="ghcr.io/falkcorp/burndown-runner-image:${OB_TAG}"
          docker pull "${src}"
          docker tag "${src}" "${dst}"
          docker push "${dst}"
          echo "Pushed: ${dst}"

      - name: Update reusable-burndown.yml in github-common
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.JF_CI_GH_PAT || secrets.GITHUB_TOKEN }}
          OB_TAG: ${{ steps.ob.outputs.tag }}
          OB_SHA: ${{ steps.ob.outputs.sha }}
        run: |
          set -euo pipefail
          git config --global user.email "ci-bot@falkcorp.dev"
          git config --global user.name "falkcorp-ci-bot"

          # Clone github-common using the PAT for push access
          git clone "https://oauth2:${GH_TOKEN}@github.com/falkcorp/github-common.git" /tmp/gc
          cd /tmp/gc

          BRANCH="chore/burndown-image-${OB_TAG}"
          git checkout -b "${BRANCH}"

          # Replace every pinned image SHA in reusable-burndown.yml with the new ob- tag
          sed -i "s|burndown-runner-image:[a-zA-Z0-9_.-]*|burndown-runner-image:${OB_TAG}|g" \
            .github/workflows/reusable-burndown.yml

          git diff --exit-code .github/workflows/reusable-burndown.yml && {
            echo "No changes needed — reusable-burndown.yml already uses ${OB_TAG}"
            exit 0
          }

          # Evaluate the diff: auto-merge only if every changed line is an
          # image-tag replacement. Any unexpected change → open for review.
          UNEXPECTED=$(git diff --unified=0 .github/workflows/reusable-burndown.yml \
            | grep "^[+-]" \
            | grep -v "^---\|^+++" \
            | grep -v "burndown-runner-image:" || true)
          LINES_CHANGED=$(git diff --shortstat .github/workflows/reusable-burndown.yml \
            | grep -oE '[0-9]+' | awk '{s+=$1} END {print s+0}')

          if [ -n "$UNEXPECTED" ] || [ "${LINES_CHANGED}" -gt 20 ]; then
            AUTO_MERGE=false
            HOLD_REASON="Diff contains unexpected changes (${LINES_CHANGED} lines, or non-tag modifications). Review before merging."
          else
            AUTO_MERGE=true
            HOLD_REASON=""
          fi

          git add .github/workflows/reusable-burndown.yml
          git commit -m "chore: update burndown-runner-image to ${OB_TAG}"
          git push origin "${BRANCH}"

          PR_BODY="$(printf 'Automatic update from burndown-runner-image build.\n\nNew image tag: `ghcr.io/falkcorp/burndown-runner-image:%s`\nContains overnight-burndown@%s\n\n**Lines changed:** %s\n**Auto-merged:** %s%s\n\n---\n🤖 Generated by the Build image workflow' \
            "${OB_TAG}" "${OB_SHA}" "${LINES_CHANGED}" "${AUTO_MERGE}" \
            "${HOLD_REASON:+$'\n\n⚠️ HELD FOR REVIEW: '}${HOLD_REASON}")"

          PR_URL=$(gh pr create \
            --title "chore: update burndown-runner-image to ${OB_TAG}" \
            --body "${PR_BODY}" \
            --repo falkcorp/github-common \
            --base main \
            --head "${BRANCH}")

          if [ "${AUTO_MERGE}" = "true" ]; then
            gh pr merge "${PR_URL}" --repo falkcorp/github-common --rebase --admin
            echo "Auto-merged: ${PR_URL}"
          else
            echo "Held for review (${LINES_CHANGED} lines changed, unexpected diff): ${PR_URL}"
            echo "${HOLD_REASON}"
          fi
