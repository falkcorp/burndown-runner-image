# file: .github/workflows/release.yml
# version: 2.3.0
# guid: f0c1ker0-0000-4000-8000-000000000003

name: Build image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      stable:
        description: 'Publish as stable release (not pre-release)'
        required: false
        default: 'false'
        type: string

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  checks: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build + push image
    uses: falkcorp/github-common/.github/workflows/reusable-release.yml@483f3afeb0064ccbe6ad565044042ba6faee1f96 # v2.14.0
    with:
      release-type: 'auto'
      prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') && inputs.stable != 'true' }}
      stable: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.stable == 'true' }}
      draft: false
      docker-enabled: true
      build-target: 'docker'
    secrets: inherit
